services:
  - type: web
    name: aegis-backend
    env: node
    plan: starter
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SERVE_STATIC
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: MCP_API_KEY
        sync: false
      - key: SOLANA_RPC_URL
        sync: false
      - key: TREASURY_WALLET
        sync: false
      - key: ADMIN_WALLETS
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: GUARDRAILS_SERVER_URL
        sync: false
      - key: GUARDRAILS_ENABLED
        sync: false
