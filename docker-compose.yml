version: "3.8"

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: aegis
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  guardrails:
    build:
      context: .
      dockerfile: Dockerfile.guardrails
    restart: unless-stopped
    ports:
      - "127.0.0.1:4001:4001"
    environment:
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/v1/rails/configs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  aegis:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_WALLETS: ${ADMIN_WALLETS}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      TREASURY_WALLET: ${TREASURY_WALLET}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
      GUARDRAILS_SERVER_URL: http://guardrails:4001
      GUARDRAILS_ENABLED: ${GUARDRAILS_ENABLED:-true}
      PORT: 3000
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  mysql_data:
