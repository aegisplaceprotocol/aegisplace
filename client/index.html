<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1"
    />
    <title>Aegis Place</title>
    <meta
      name="description"
      content="A decentralized marketplace protocol on Solana where developers upload AI agent skills and earn 70% of every invocation fee automatically."
    />
    <meta
      name="robots"
      content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1"
    />
    <link rel="canonical" href="https://aegisplace.com/" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon.png" />
    <meta property="og:image" content="/AegisBanner.jpg" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Aegis Place" />
    <meta property="og:title" content="Aegis Place" />
    <meta
      property="og:description"
      content="A decentralized marketplace protocol on Solana where developers upload AI agent skills and earn 70% of every invocation fee automatically."
    />
    <meta property="og:url" content="https://aegisplace.com/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Aegis Place" />
    <meta
      name="twitter:description"
      content="A decentralized marketplace protocol on Solana where developers upload AI agent skills and earn 70% of every invocation fee automatically."
    />
    <meta name="twitter:image" content="/AegisBanner.jpg" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Aegis Place",
        "url": "https://aegisplace.com",
        "description": "A decentralized marketplace protocol on Solana where developers upload AI agent skills and earn 70% of every invocation fee automatically.",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Web",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "creator": {
          "@type": "Organization",
          "name": "Aegis Place"
        }
      }
    </script>

    <!-- SECURITY: Maximum lockdown -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https: wss: http:; frame-src 'self' https://dexscreener.com https://bags.fm; object-src 'none'; base-uri 'self'; form-action 'self';"
    />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
    <meta name="referrer" content="no-referrer" />
    <meta
      http-equiv="Permissions-Policy"
      content="camera=(), microphone=(), geolocation=(), interest-cohort=(), browsing-topics=(), attribution-reporting=(), run-ad-auction=(), join-ad-interest-group=(), idle-detection=(), serial=(), usb=(), bluetooth=(), hid=(), ambient-light-sensor=(), accelerometer=(), gyroscope=(), magnetometer=(), payment=(), screen-wake-lock=()"
    />
    <!-- COOP/COEP/CORP removed: breaks wallet popups and cross-origin fonts -->
    <meta name="format-detection" content="telephone=no" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      @font-face {
        font-family: "Aeonik";
        src: url("/fonts/Aeonik-Regular.ttf") format("truetype");
        font-weight: 400;
        font-display: swap;
      }
      @font-face {
        font-family: "Aeonik";
        src: url("/fonts/Aeonik-Bold.ttf") format("truetype");
        font-weight: 700;
        font-display: swap;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
