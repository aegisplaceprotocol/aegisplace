[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "aegis-sdk"
version = "1.0.0"
description = "Python SDK for Aegis Protocol - invoke AI skills on Solana with USDC settlement"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"
dependencies = ["httpx>=0.25.0"]
keywords = ["aegis", "solana", "ai-agent", "mcp", "x402", "usdc"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Software Development :: Libraries",
]

[project.urls]
Homepage = "https://aegisplace.com"
Documentation = "https://aegisplace.com/docs"
Repository = "https://github.com/aegis-protocol/aegis"
