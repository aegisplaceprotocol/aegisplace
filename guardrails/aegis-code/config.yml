models:
  - type: main
    engine: nvidia_ai_endpoints
    model: nvidia/llama-3.1-nemotron-70b-instruct
    parameters:
      api_key_env_var: NVIDIA_API_KEY
  - type: content_safety
    engine: nim
    model: nvidia/llama-3.1-nemoguard-8b-content-safety
    parameters:
      base_url: "https://integrate.api.nvidia.com/v1"
      api_key_env_var: NVIDIA_API_KEY
  - type: embeddings
    engine: FastEmbed
    model: all-MiniLM-L6-v2

rails:
  input:
    flows:
      - content safety check input $model=content_safety
      - check jailbreak
      - mask sensitive data on input
      - check injection
  output:
    flows:
      - content safety check output $model=content_safety
      - self check hallucination

config:
  jailbreak_detection:
    length_per_perplexity_threshold: 89.79
    prefix_suffix_perplexity_threshold: 1845.65
  sensitive_data_detection:
    input:
      entities: [PERSON, EMAIL_ADDRESS, PHONE_NUMBER, CREDIT_CARD, API_KEY, PASSWORD]
      mask_token: "[REDACTED]"
      score_threshold: 0.4
    output:
      entities: [API_KEY, PASSWORD, SSH_KEY]
      mask_token: "[REDACTED]"
      score_threshold: 0.4
  injection_detection:
    injections: [sqli, template, code, xss, shell]
    action: reject
  content_safety:
    refusal_messages:
      en: "This code operator invocation was blocked by Aegis safety checks."
