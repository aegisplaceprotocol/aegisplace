models:
  - type: main
    engine: nvidia_ai_endpoints
    model: nvidia/llama-3.1-nemotron-70b-instruct
    parameters:
      api_key_env_var: NVIDIA_API_KEY
  - type: content_safety
    engine: nim
    model: nvidia/llama-3.1-nemoguard-8b-content-safety
    parameters:
      base_url: "https://integrate.api.nvidia.com/v1"
      api_key_env_var: NVIDIA_API_KEY
  - type: embeddings
    engine: FastEmbed
    model: all-MiniLM-L6-v2

rails:
  input:
    flows:
      - content safety check input $model=content_safety
      - check jailbreak
      - mask sensitive data on input
      - check injection
      - check forbidden terms
  output:
    flows:
      - content safety check output $model=content_safety
      - self check hallucination
      - check sensitive output

config:
  jailbreak_detection:
    length_per_perplexity_threshold: 70.00
    prefix_suffix_perplexity_threshold: 1500.00
  sensitive_data_detection:
    input:
      entities: [PERSON, EMAIL_ADDRESS, PHONE_NUMBER, CREDIT_CARD, IP_ADDRESS, API_KEY, PASSWORD, SSH_KEY]
      mask_token: "[REDACTED]"
      score_threshold: 0.3
    output:
      entities: [PERSON, EMAIL_ADDRESS, PHONE_NUMBER, CREDIT_CARD, IP_ADDRESS, API_KEY, PASSWORD, SSH_KEY]
      mask_token: "[REDACTED]"
      score_threshold: 0.3
  injection_detection:
    injections: [sqli, template, code, xss, shell, path_traversal]
    action: reject
  content_safety:
    refusal_messages:
      en: "This security-audit operator invocation was blocked by Aegis safety checks. Security operators have stricter safety requirements."
